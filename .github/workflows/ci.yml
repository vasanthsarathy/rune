name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        # Odin validates the -out extension per platform: Windows needs .exe,
        # Unix takes none. Unset entries render as an empty string.
        include:
          - os: windows-latest
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux graphics deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev

      # setup-odin@v2 installs the latest Odin nightly by default — which is what
      # Rune tracks. For a reproducible build, pin a specific version with the
      # action's `release:` input (see https://github.com/laytan/setup-odin).
      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Version
        run: odin version

      - name: Unit tests
        run: |
          odin test canvas
          odin test editor
          odin test runner
          odin test sketch

      # Odin won't create the -out directory; make it before building.
      - name: Prepare build dir
        shell: bash
        run: mkdir -p build

      - name: Build IDE
        run: odin build rune -out:build/rune${{ matrix.ext }} -o:speed

      - name: Build sketches
        shell: bash
        env:
          EXT: ${{ matrix.ext }}
        run: |
          for d in sketches/*/; do
            odin build "$d" -out:"build/$(basename "$d")$EXT" -o:speed
          done
